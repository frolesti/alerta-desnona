# Alerta Desnona — Build & Deploy
#
# Construeix la imatge Docker i la puja a GitHub Container Registry (GHCR).
# Opcionalment desplega a Railway, Fly.io o qualsevol host Docker.
#
# Triggers:
#   - Push a `main` (deploy automàtic)
#   - Manual dispatch (escollir environment)
#
# Secrets necessaris (a GitHub > Settings > Environments):
#   - VAPID_PUBLIC_KEY, VAPID_PRIVATE_KEY, VAPID_EMAIL
#   - SMTP_HOST, SMTP_PORT, SMTP_USER, SMTP_PASS, SMTP_FROM
#   - FIREBASE_PROJECT_ID, FIREBASE_PRIVATE_KEY, FIREBASE_CLIENT_EMAIL
#   - (Opcional) RAILWAY_TOKEN o FLY_API_TOKEN per deploy automàtic

name: Build & Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - ".github/workflows/daily-update.yml"

  workflow_dispatch:
    inputs:
      environment:
        description: "Environment on desplegar"
        required: true
        default: "production"
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'production' }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: "Build & Push Docker [${{ github.event.inputs.environment || 'production' }}]"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ github.event.inputs.environment || 'production' }}

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: "Checkout repositori"
        uses: actions/checkout@v4

      - name: "Login a GitHub Container Registry"
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Metadades de la imatge Docker"
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ github.event.inputs.environment || 'production' }}

      - name: "Configurar Docker Buildx"
        uses: docker/setup-buildx-action@v3

      - name: "Build & Push imatge Docker"
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL || '' }}

      - name: "Resum del build"
        run: |
          echo "## 🐳 Docker Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Imatge**: \`${{ steps.meta.outputs.tags }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ github.event.inputs.environment || 'production' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

